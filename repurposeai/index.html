<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepurposeAI 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 1200px; margin: 0 auto; padding: 40px; }
        h1 { font-size: 48px; color: #333; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .model-badge { background: #28a745; color: white; padding: 5px 15px; border-radius: 50px; font-size: 14px; font-weight: bold; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 18px; border-left: 4px solid #28a745; padding-left: 15px; }
        .api-section { background: #f8f9fa; border-radius: 10px; padding: 20px; margin-bottom: 30px; border: 2px dashed #28a745; }
        .api-input-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .api-input { flex: 2; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; min-width: 250px; }
        .api-input:focus { outline: none; border-color: #28a745; }
        .api-save-btn { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .api-save-btn:hover { background: #218838; }
        .api-status { margin-top: 10px; font-size: 14px; color: #28a745; }
        .input-area { margin-bottom: 30px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; resize: vertical; }
        textarea:focus { outline: none; border-color: #28a745; }
        .button-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-primary { background: linear-gradient(135deg, #28a745, #20c997); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; flex: 2; transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(40,167,69,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #f0f0f0; color: #333; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-secondary:hover { background: #e0e0e0; }
        .counter-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .premium-btn { background: #ffc107; color: #333; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .loading { text-align: center; padding: 40px; background: #f8f9fa; border-radius: 10px; margin: 20px 0; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .result-card { background: #f8f9fa; border-radius: 10px; padding: 20px; border-left: 4px solid #28a745; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .result-title { font-size: 18px; color: #28a745; font-weight: bold; }
        .copy-btn { background: #28a745; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .result-content { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.6; }
        .copy-all-btn { background: #007bff; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 30px auto 0; display: block; }
        .error-box { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #f5c6cb; }
        .info-box { background: #d4edda; padding: 10px; border-radius: 5px; font-size: 14px; margin-top: 15px; }
        .footer { margin-top: 40px; text-align: center; color: #999; font-size: 14px; }
        @media (max-width: 768px) { .container { padding: 20px; } h1 { font-size: 32px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🔄</span>
            RepurposeAI
            <span class="model-badge">✨ Llama 3.3 70B</span>
        </h1>

        <div class="subtitle">
            🚀 Tek içerik → 10 platforma hazır!
        </div>

        <div class="api-section">
            <h3 style="margin-bottom: 15px;">🔑 Groq API Key</h3>
            <div class="api-input-group">
                <input type="password" id="apiKey" class="api-input" placeholder="gsk_ ile başlayan Groq API key">
                <button class="api-save-btn" onclick="saveApiKey()">💾 Kaydet</button>
            </div>
            <div id="apiStatus" class="api-status"></div>
            <div class="info-box">
                <p>✅ <strong>Model:</strong> llama-3.3-70b-versatile</p>
                <p>🔒 Key'in sadece bu oturumda tutulur, sunucuya kaydedilmez.</p>
            </div>
        </div>

        <div class="input-area">
            <textarea id="contentInput" placeholder="📝 İçeriğini buraya yapıştır..."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="repurposeWithAI()" id="repurposeBtn">🔄 REPURPOSE ET</button>
            <button class="btn-secondary" onclick="clearAll()">🧹 Temizle</button>
        </div>

        <div class="counter-box">
            <span>⚡ <span id="remainingUses">3</span>/3 ücretsiz kullanım</span>
            <button class="premium-btn" onclick="goPremium()">✨ Premium — 9$/ay</button>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="loading-spinner"></div>
            <p>🚀 Llama 3.3 çalışıyor... (10-15 saniye)</p>
        </div>

        <div id="errorBox"></div>
        <div id="results"></div>

        <div class="footer">⚡ Premium: Sınırsız kullanım + PDF/Word indirme</div>
    </div>

    <script>
        // ✅ Tüm state bellekte (localStorage yok)
        const state = {
            remainingUses: 3,
            apiKey: '',
            results: []
        };

        // ✅ Vercel'e deploy ettiğinde bu URL otomatik çalışır.
        // Yerel geliştirme için: http://localhost:3000/api/repurpose
        const API_URL = '/api/repurpose';

        updateCounter();

        function updateCounter() {
            document.getElementById('remainingUses').textContent = state.remainingUses;
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key && key.startsWith('gsk_')) {
                state.apiKey = key;
                document.getElementById('apiStatus').textContent = '✅ Key aktif (bu oturumda geçerli)';
            } else {
                showError('❌ Geçersiz key. gsk_ ile başlamalı.');
            }
        }

        function clearAll() {
            document.getElementById('contentInput').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('errorBox').innerHTML = '';
            state.results = [];
        }

        function goPremium() {
            alert('🎯 Premium yakında geliyor!');
        }

        function showError(msg) {
            document.getElementById('errorBox').innerHTML =
                `<div class="error-box">${escapeHtml(msg)}</div>`;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str));
            return d.innerHTML;
        }

        async function repurposeWithAI() {
            const content = document.getElementById('contentInput').value.trim();
            const apiKey = state.apiKey || document.getElementById('apiKey').value.trim();

            document.getElementById('errorBox').innerHTML = '';

            if (!content)  { showError('📝 Lütfen içerik yapıştır!'); return; }
            if (!apiKey || !apiKey.startsWith('gsk_')) { showError('🔑 Önce geçerli bir Groq API key kaydet!'); return; }
            if (state.remainingUses <= 0) { showError('✨ Ücretsiz hakkın bitti. Premium\'a geç!'); return; }

            state.apiKey = apiKey;

            document.getElementById('repurposeBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';

            try {
                // ✅ CORS yok — isteği kendi backend'imize atıyoruz
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, apiKey })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || `Sunucu hatası: ${res.status}`);
                }

                state.results = data.formatlar;
                state.remainingUses--;
                updateCounter();
                displayResults(data.formatlar);

            } catch (err) {
                console.error(err);
                showError('❌ Hata: ' + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('repurposeBtn').disabled = false;
            }
        }

        function displayResults(formats) {
            let html = '<h2 style="margin:40px 0 20px;">🎯 Sonuçlar:</h2><div class="results-grid">';

            formats.forEach((f, i) => {
                html += `
                    <div class="result-card">
                        <div class="result-header">
                            <span class="result-title">${escapeHtml((i + 1) + '. ' + f.isim)}</span>
                            <button class="copy-btn" data-index="${i}">📋 Kopyala</button>
                        </div>
                        <div class="result-content" id="content-${i}"></div>
                    </div>`;
            });

            html += '</div><button class="copy-all-btn" id="copyAllBtn">📋 TÜMÜNÜ KOPYALA</button>';
            document.getElementById('results').innerHTML = html;

            // ✅ XSS yok — textContent ile güvenli ekleme
            formats.forEach((f, i) => {
                const el = document.getElementById(`content-${i}`);
                if (el) el.textContent = f.icerik;
            });

            // ✅ Event delegation — onclick tırnak çakışması yok
            document.getElementById('results').addEventListener('click', (e) => {
                if (e.target.classList.contains('copy-btn')) {
                    copyText(e.target, parseInt(e.target.dataset.index));
                }
                if (e.target.id === 'copyAllBtn') copyAll();
            });
        }

        function copyText(btn, index) {
            const text = state.results[index]?.icerik || '';
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.innerText;
                btn.innerText = '✅ Kopyalandı!';
                setTimeout(() => btn.innerText = orig, 2000);
            }).catch(() => showError('⚠️ Kopyalama başarısız. Manuel seç ve kopyala.'));
        }

        function copyAll() {
            const text = state.results.map((f, i) =>
                `${i + 1}. ${f.isim}\n${'─'.repeat(30)}\n${f.icerik}`
            ).join('\n\n');

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Tümü kopyalandı!');
            }).catch(() => showError('⚠️ Kopyalama başarısız. Manuel seç ve kopyala.'));
        }
    </script>
</body>
</html>
